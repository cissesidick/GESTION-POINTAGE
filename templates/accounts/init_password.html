<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activer mon compte | PointagePro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ static('css/custom.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-dark-page">

<div class="login-container p-4">
  <div class="card bg-dark border-secondary border-opacity-10 shadow-lg rounded-4 p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="logo-box bg-primary p-3 rounded-circle d-inline-block mb-3">
        <i class="bi bi-shield-lock-fill fs-1 text-white"></i>
      </div>
      <h3 class="fw-bold">Activation</h3>
      <p class="text-muted small">Configurez vos accès pour commencer</p>
    </div>

    {% for message in get_messages(request) %}
      <div class="alert alert-{{ 'danger' if message.tags == 'error' else 'success' }} small">{{ message }}</div>
    {% endfor %}

    <form method="POST">
      {{ django_csrf_input(request) }}
      <div class="mb-3">
        <label class="form-label small text-muted">MATRICULE</label>
        <input type="text" name="matricule" class="form-control bg-dark border-secondary border-opacity-25" placeholder="Votre numéro de matricule" required>
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted">EMAIL</label>
        <input type="email" name="email" class="form-control bg-dark border-secondary border-opacity-25" placeholder="votre.email@entreprise.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted">NOUVEAU MOT DE PASSE</label>
        <input type="password" name="password" class="form-control bg-dark border-secondary border-opacity-25" placeholder="Min. 8 caractères" required>
      </div>
      <div class="mb-4">
        <label class="form-label small text-muted">CONFIRMER LE MOT DE PASSE</label>
        <input type="password" name="confirm_password" class="form-control bg-dark border-secondary border-opacity-25" placeholder="********" required>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3">
        ACTIVER MON COMPTE
      </button>
    </form>
    
    <div class="text-center mt-4">
      <a href="{{ url('accounts:login') }}" class="text-muted small text-decoration-none">Retour à la connexion</a>
    </div>
  </div>
</div>

</body>
</html>
